services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: elrom-postgres
    environment:
      POSTGRES_USER: elrom
      POSTGRES_PASSWORD: elrom
      POSTGRES_DB: elrom
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "elrom"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
