## Render Blueprint for elrom-platform.
## To deploy: Render dashboard → New → Blueprint → select this repo → Apply.
## After the first deploy, paste your API keys in the backend service's "Environment" tab.
## Free tier is enough for design-partner stage; upgrade plans later.

databases:
  - name: elrom-postgres
    plan: free
    postgresMajorVersion: 16
    region: frankfurt

services:
  - type: web
    name: elrom-backend
    runtime: python
    plan: starter
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /api/health
    disk:
      # Persistent storage for original uploaded files (PDFs, etc.).
      # Files are written to $STORAGE_DIR at ingest and served back to the
      # frontend via GET /api/documents/{id}/file.
      name: elrom-storage
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.13
      - key: DATABASE_URL
        fromDatabase:
          name: elrom-postgres
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: EMBEDDING_PROVIDER
        value: cohere
      - key: COHERE_EMBED_MODEL
        value: embed-multilingual-v3.0
      - key: CLAUDE_ANSWER_MODEL
        value: claude-sonnet-4-6
      - key: CLAUDE_EXTRACT_MODEL
        value: claude-haiku-4-5-20251001
      - key: MAGIC_LINK_FROM_EMAIL
        value: noreply@elrom.tv
      - key: STORAGE_DIR
        value: /var/data/documents
      # Mail (Resend). Until klaser.co.il verifies in the Resend dashboard,
      # MAIL_FROM_EMAIL stays as onboarding@resend.dev. Flip to
      # noreply@klaser.co.il once DNS records propagate.
      - key: MAIL_FROM_EMAIL
        value: onboarding@resend.dev
      - key: MAIL_FROM_NAME
        value: Klaser
      - key: KLASER_APP_URL
        value: https://klaser.co.il
      - key: RESEND_API_KEY
        sync: false
      # Secrets — set these in Render UI after first deploy:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: AZURE_DI_ENDPOINT
        sync: false
      - key: AZURE_DI_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      # FRONTEND_URL is set in Render UI after the static site URL is known:
      - key: FRONTEND_URL
        sync: false

  ## Nightly lexicon learner — scans the past 24h of conversations for
  ## refinement pairs (clarify→answer, thumbs-down→retry), proposes lexicon
  ## entries via Claude Haiku, inserts them with source="learned" /
  ## status="pending". Pending entries surface in the Lexicon tab with
  ## ✓ אשר / דחה buttons. Nothing in retrieval changes until a reviewer
  ## approves. Safe to run nightly; idempotent (existing terms are skipped).
  ##
  ## Schedule: 03:00 UTC = 06:00 Israel — runs after the daily activity
  ## window but before anyone reviews in the morning.
  ##
  ## The cron service shares the backend's env vars (database + Claude key).
  ## After first apply, set ANTHROPIC_API_KEY on this service in the Render
  ## UI — Render doesn't automatically share `sync: false` vars across
  ## services.
  - type: cron
    name: elrom-lexicon-learner
    runtime: python
    plan: starter
    region: frankfurt
    rootDir: backend
    schedule: "0 3 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m scripts.learn_lexicon --since 24h
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.13
      - key: DATABASE_URL
        fromDatabase:
          name: elrom-postgres
          property: connectionString
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: EMBEDDING_PROVIDER
        value: cohere
      - key: COHERE_EMBED_MODEL
        value: embed-multilingual-v3.0
      - key: CLAUDE_ANSWER_MODEL
        value: claude-sonnet-4-6
      - key: CLAUDE_EXTRACT_MODEL
        value: claude-haiku-4-5-20251001
      - key: SESSION_SECRET
        value: cron-job-no-session-needed
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false

  - type: web
    name: elrom-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false   # set in Render UI after the backend URL is known
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
