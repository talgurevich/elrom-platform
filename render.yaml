## Render Blueprint for elrom-platform.
## To deploy: Render dashboard → New → Blueprint → select this repo → Apply.
## After the first deploy, paste your API keys in the backend service's "Environment" tab.
## Free tier is enough for design-partner stage; upgrade plans later.

databases:
  - name: elrom-postgres
    plan: free
    postgresMajorVersion: 16
    region: frankfurt

services:
  - type: web
    name: elrom-backend
    runtime: python
    plan: starter
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /api/health
    disk:
      # Persistent storage for original uploaded files (PDFs, etc.).
      # Files are written to $STORAGE_DIR at ingest and served back to the
      # frontend via GET /api/documents/{id}/file.
      name: elrom-storage
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.13
      - key: DATABASE_URL
        fromDatabase:
          name: elrom-postgres
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: EMBEDDING_PROVIDER
        value: cohere
      - key: COHERE_EMBED_MODEL
        value: embed-multilingual-v3.0
      - key: CLAUDE_ANSWER_MODEL
        value: claude-sonnet-4-6
      - key: CLAUDE_EXTRACT_MODEL
        value: claude-haiku-4-5-20251001
      - key: MAGIC_LINK_FROM_EMAIL
        value: noreply@elrom.tv
      - key: STORAGE_DIR
        value: /var/data/documents
      # Mail (Resend). klaser.co.il verified in the Resend dashboard —
      # sender is our own domain, so we can send to any address (not just
      # the sandbox testing address).
      - key: MAIL_FROM_EMAIL
        value: noreply@klaser.co.il
      - key: MAIL_FROM_NAME
        value: Klaser
      # Note: use www.klaser.co.il, not the apex. The apex A record is
      # still parked at My Names' server until the DNS row is saved
      # (Google OAuth returns origin_mismatch when the apex resolves to
      # anything other than Render's IP). Flip back to the apex once that's
      # fixed at the registrar.
      - key: KLASER_APP_URL
        value: https://www.klaser.co.il
      - key: RESEND_API_KEY
        sync: false
      # Secrets — set these in Render UI after first deploy:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: AZURE_DI_ENDPOINT
        sync: false
      - key: AZURE_DI_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      # FRONTEND_URL is set in Render UI after the static site URL is known:
      - key: FRONTEND_URL
        sync: false

  ## Nightly lexicon learner — scans the past 24h of conversations for
  ## refinement pairs (clarify→answer, thumbs-down→retry), proposes lexicon
  ## entries via Claude Haiku, inserts them with source="learned" /
  ## status="pending". Pending entries surface in the Lexicon tab with
  ## ✓ אשר / דחה buttons. Nothing in retrieval changes until a reviewer
  ## approves. Safe to run nightly; idempotent (existing terms are skipped).
  ##
  ## Schedule: 03:00 UTC = 06:00 Israel — runs after the daily activity
  ## window but before anyone reviews in the morning.
  ##
  ## The cron service shares the backend's env vars (database + Claude key).
  ## After first apply, set ANTHROPIC_API_KEY on this service in the Render
  ## UI — Render doesn't automatically share `sync: false` vars across
  ## services.
  - type: cron
    name: elrom-lexicon-learner
    runtime: python
    plan: starter
    region: frankfurt
    rootDir: backend
    schedule: "0 3 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m scripts.learn_lexicon --since 24h
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.13
      - key: DATABASE_URL
        fromDatabase:
          name: elrom-postgres
          property: connectionString
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: EMBEDDING_PROVIDER
        value: cohere
      - key: COHERE_EMBED_MODEL
        value: embed-multilingual-v3.0
      - key: CLAUDE_ANSWER_MODEL
        value: claude-sonnet-4-6
      - key: CLAUDE_EXTRACT_MODEL
        value: claude-haiku-4-5-20251001
      - key: SESSION_SECRET
        value: cron-job-no-session-needed
      # Identity SDK — cron has no browser session, must call identity
      # via the service-token endpoints (list_tenants, list_users) that
      # scripts/learn_lexicon.py uses. Set the token in Render UI after
      # first apply; sync:false vars don't share across services.
      - key: IDENTITY_URL
        value: https://auth.klaser.co.il
      - key: IDENTITY_SERVICE_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false

  ## Weekly lexicon digest — one email per super-admin, Sunday 07:00 IL
  ## (04:00 UTC). Runs before the work week starts so the super-admin
  ## can triage pending learned entries first thing Monday-morning.
  ##
  ## Skips super-admins whose tenants had zero lexicon activity in the
  ## window — no "nothing this week" emails. Uses the same Resend key as
  ## the backend; set RESEND_API_KEY on this service in Render UI after
  ## first apply (sync:false vars don't auto-share across services).
  - type: cron
    name: elrom-weekly-digest
    runtime: python
    plan: starter
    region: frankfurt
    rootDir: backend
    schedule: "0 4 * * 0"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m scripts.send_weekly_digests
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.13
      - key: DATABASE_URL
        fromDatabase:
          name: elrom-postgres
          property: connectionString
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: SESSION_SECRET
        value: cron-job-no-session-needed
      - key: MAIL_FROM_EMAIL
        value: noreply@klaser.co.il
      - key: MAIL_FROM_NAME
        value: Klaser
      # Note: use www.klaser.co.il, not the apex. The apex A record is
      # still parked at My Names' server until the DNS row is saved
      # (Google OAuth returns origin_mismatch when the apex resolves to
      # anything other than Render's IP). Flip back to the apex once that's
      # fixed at the registrar.
      - key: KLASER_APP_URL
        value: https://www.klaser.co.il
      - key: RESEND_API_KEY
        sync: false
      # Identity SDK — scripts/send_weekly_digests.py calls
      # list_super_admin_emails via the service-token endpoint.
      - key: IDENTITY_URL
        value: https://auth.klaser.co.il
      - key: IDENTITY_SERVICE_TOKEN
        sync: false

  - type: web
    name: elrom-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false   # set in Render UI after the backend URL is known
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
